# --- Limits: request and session constraints ---
limits:
  # Maximum character length of a single user message
  max_message_length: 4000
  # Maximum messages kept in conversation history
  max_history_messages: 100
  # Maximum tool-use turns per single request
  max_turns: 10
  # Maximum concurrent requests the agent handles simultaneously
  max_concurrent: 50
  # Maximum queued requests waiting to be processed
  max_pending: 1000

# --- Context: context window management and compaction ---
context:
  # Known model context sizes (used for compaction calculations)
  model_metadata:
    gpt-4o:
      context_window_size: 128000
      max_output_tokens: 16384
    gpt-4o-mini:
      context_window_size: 128000
      max_output_tokens: 16384
  # Fallback context window size for unknown models
  default_context_window_size: 128000
  # Fallback max output tokens for unknown models
  default_max_output_tokens: 4096

  # Microcompact: aggressive compaction of old/stale messages
  microcompact:
    # Enable microcompact to compress old messages automatically
    enabled: true
    # Minutes of inactivity before a conversation gap triggers compaction
    gap_threshold_minutes: 60
    # Number of recent tool results to keep uncompacted
    keep_recent_results: 5

  # Tool result persistence: offload large tool results to disk
  tool_result_persistence:
    # Enable disk-based storage for large tool outputs
    enabled: true
    # Max characters kept inline per tool result (rest goes to disk)
    default_max_result_chars: 10000
    # Total character budget for tool results per message
    per_message_budget_chars: 30000
    # Bytes of preview kept inline when a result is offloaded
    preview_size_bytes: 2000
    # Directory for storing offloaded tool results
    storage_dir: /tmp/digitalme-agent

  # Session memory: extract and maintain a running memory of the conversation
  session_memory:
    # Enable session memory extraction (experimental)
    enabled: false

  # Compaction thresholds: context usage ratios that trigger compaction stages
  thresholds:
    # Context usage ratio that triggers microcompact
    microcompact_ratio: 0.5
    # Context usage ratio that triggers projection-based compaction
    projection_ratio: 0.7
    # Context usage ratio that triggers overflow compaction (drop oldest messages)
    overflow_ratio: 0.9

# --- Security ---
security:
  # Maximum age (seconds) of HMAC-signed requests before they're rejected
  hmac_tolerance_seconds: 300

