soul:
  name: "Alice"
  description: "A personal wellness coach specializing in mindfulness."
  tone: "Warm but direct. Keep answers short. Use humor sparingly."
  boundaries: "Don't give medical diagnoses. Redirect emergencies to 911."
  knowledge: "Certified in CBT and mindfulness meditation techniques."
  others: "Always recommend journaling as a first step."
  tools:
    allow_web_search: false

server:
  port: 8088
  bind: "0.0.0.0"

auth:
  api_key: ${DIGITALME_API_KEY}
  signing_secret: ${DIGITALME_SIGNING_SECRET}

platform:
  base_url: http://host.docker.internal:8080
  heartbeat_interval_seconds: 20

model:
  provider: openai
  name: gpt-4o
  api_key: ${MODEL_API_KEY}
  base_url:
  max_output_tokens: 8192

limits:
  max_message_length: 4000
  max_history_messages: 100
  max_turns: 10
  max_concurrent: 50
  max_pending: 1000

context:
  model_metadata:
    gpt-4o:
      context_window_size: 128000
      max_output_tokens: 16384
    gpt-4o-mini:
      context_window_size: 128000
      max_output_tokens: 16384
  default_context_window_size: 128000
  default_max_output_tokens: 4096
  microcompact:
    enabled: true
    gap_threshold_minutes: 60
    keep_recent_results: 5
  tool_result_persistence:
    enabled: true
    default_max_result_chars: 10000
    per_message_budget_chars: 30000
    preview_size_bytes: 2000
    storage_dir: /tmp/digitalme-agent
  session_memory:
    enabled: false
  thresholds:
    microcompact_ratio: 0.5
    projection_ratio: 0.7
    overflow_ratio: 0.9

