# =============================================================================
# DigitalMe Agent Configuration
# =============================================================================
# Copy this file to config.yaml and edit it to match your agent.
#   cp config.example.yaml config.yaml

# --- Soul: defines who your agent is and how it behaves ---
soul:
  # Display name of the agent
  name: "Alice"
  # One-line description of who the agent is
  description: "A personal wellness coach specializing in mindfulness."
  # How the agent speaks — warm, blunt, formal, playful, etc.
  tone: "Warm but direct. Keep answers short. Use humor sparingly."
  # What the agent won't do or discuss
  boundaries: "Don't give medical diagnoses. Redirect emergencies to 911."
  # Domain expertise or topics the agent knows about
  knowledge: "Certified in CBT and mindfulness meditation techniques."
  # Any additional context baked into the agent's personality
  others: "Always recommend journaling as a first step."
  # Override the entire system prompt (advanced — omit to use the default)
  # system_prompt_override:
  # Append extra instructions to the default system prompt
  # system_prompt_append:
  tools:
    # Allow the agent to search the web during conversations
    allow_web_search: false

# --- Server: HTTP listener settings ---
server:
  # Port the agent listens on (default: 8088)
  port: 8088
  # Bind address (0.0.0.0 = all interfaces)
  bind: "0.0.0.0"

# --- Auth: credentials from the platform ---
auth:
  # API key generated when you connect an agent on the platform
  api_key: ${DIGITALME_API_KEY}
  # HMAC signing secret for verifying platform requests
  signing_secret: ${DIGITALME_SIGNING_SECRET}

# --- Platform: connection to the DigitalMe platform ---
platform:
  # Platform API URL (set to null for standalone mode without a platform)
  base_url: http://host.docker.internal:8080
  # How often (seconds) the agent sends a heartbeat to the platform
  heartbeat_interval_seconds: 20

# --- Model: primary LLM provider ---
model:
  # LLM provider: openai | anthropic | xai | groq | google-ai-studio | fireworks | together
  provider: openai
  # Model name (e.g. gpt-4o, claude-sonnet-4-20250514, gemini-2.5-flash)
  name: gpt-4o
  # API key for the LLM provider
  api_key: ${MODEL_API_KEY}
  # Custom API base URL (null = use provider default)
  base_url:
  # Maximum tokens the model can generate per response
  max_output_tokens: 8192

