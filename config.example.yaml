# =============================================================================
# DigitalMe Agent Configuration
# =============================================================================
# Copy this file to config.yaml and edit it to match your agent.
#   cp config.example.yaml config.yaml

# --- Soul: defines who your agent is and how it behaves ---
soul:
  name: "Alice"
  description: "A personal wellness coach specializing in mindfulness."
  tone: "Warm but direct. Keep answers short. Use humor sparingly."
  boundaries: "Don't give medical diagnoses. Redirect emergencies to 911."
  knowledge: "Certified in CBT and mindfulness meditation techniques."
  others: "Always recommend journaling as a first step."
  # system_prompt_override:   # Replace the entire system prompt (advanced)
  # system_prompt_append:     # Append extra instructions to the default prompt
  tools:
    allow_web_search: false

# --- Server: HTTP listener settings ---
server:
  port: 8088
  bind: "0.0.0.0"

# --- Auth: credentials generated when you connect an agent on the platform ---
auth:
  api_key: ${DIGITALME_API_KEY}
  signing_secret: ${DIGITALME_SIGNING_SECRET}

# --- Platform: connection to the DigitalMe platform ---
platform:
  # Set to null for standalone mode without a platform
  base_url: http://host.docker.internal:8080
  heartbeat_interval_seconds: 20

# --- Model: primary LLM provider ---
model:
  # Supported: openai | anthropic | xai | groq | google-ai-studio | fireworks | together
  provider: openai
  name: gpt-5.4
  api_key: ${MODEL_API_KEY}
  base_url:
  max_output_tokens: 8192

# --- Fallback model (optional): used when the primary provider is unhealthy ---
fallback_model:
  provider: anthropic
  name: claude-sonnet-4-20250514
  api_key: ${FALLBACK_API_KEY}
  max_output_tokens: 8192

# --- Routing: provider health tracking ---
routing:
  health:
    enabled: true
    window_size: 20               # Recent calls in the sliding window
    failure_threshold: 0.5        # Failure rate (0–1) that triggers fallback
    recovery_after_seconds: 60    # Cooldown before retrying an unhealthy provider

# --- Limits: request and session constraints ---
limits:
  max_message_length: 4000
  max_history_messages: 100
  max_turns: 10                     # Max tool-use turns per single request
  max_concurrent: 50
  max_pending: 1000

# --- Context: context window management and compaction ---
context:
  model_metadata:
    gpt-5.4:
      context_window_size: 128000
      max_output_tokens: 16384
    gpt-5.4-mini:
      context_window_size: 128000
      max_output_tokens: 16384
  default_context_window_size: 128000
  default_max_output_tokens: 4096
  microcompact:
    enabled: true
    gap_threshold_minutes: 60       # Inactivity gap before compaction kicks in
    keep_recent_results: 5
  tool_result_persistence:
    enabled: true
    default_max_result_chars: 10000
    per_message_budget_chars: 30000
    preview_size_bytes: 2000
    storage_dir: /tmp/digitalme-agent
  session_memory:
    enabled: false
  thresholds:
    microcompact_ratio: 0.5         # Context usage ratio triggering microcompact
    projection_ratio: 0.7           # Ratio triggering projection-based compaction
    overflow_ratio: 0.9             # Ratio triggering overflow compaction

# --- Security ---
security:
  hmac_tolerance_seconds: 300       # Max age of signed requests before rejection

