services:
  digitalme-agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8088:8088"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: false
    environment:
      DIGITALME_CONFIG: /app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - rollouts:/app/.digital_me_agent/rollouts
      - ./skills-local:/app/skills-local:ro
    networks:
      - default
      - platform

networks:
  platform:
    external: true
    name: platform_default

volumes:
  rollouts:
